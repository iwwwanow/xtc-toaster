name: Publish images

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  OWNER: iwwwanow

jobs:
  build-api:
    name: Build & push api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: packages/api
          push: true
          tags: ghcr.io/iwwwanow/xtc-toaster-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build & push web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: packages/web
          push: true
          tags: ghcr.io/iwwwanow/xtc-toaster-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
